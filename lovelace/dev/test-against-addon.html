<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>EcoFlow Card Add-on Load Test</title>
    <style>
      body { font: 13px ui-monospace, monospace; background: #111; color: #ddd; padding: 16px; }
      h1 { font: bold 18px sans-serif; margin: 0 0 12px; }
      .row { margin: 6px 0; padding: 4px 8px; border-radius: 4px; }
      .ok { background: #0a3a0a; color: #afa; }
      .fail { background: #3a0a0a; color: #faa; }
      pre { white-space: pre-wrap; word-break: break-all; }
      /* Shim ha-card so the cards don't choke on undefined element */
      ha-card { display: block; background: #1e1e1e; border: 1px solid #333; border-radius: 6px; padding: 8px; margin: 8px 0; }
    </style>
  </head>
  <body>
    <h1>EcoFlow card add-on load test</h1>
    <p>Loads each bundle from http://homeassistant.local:8787/lovelace/&lt;card&gt;.js
    exactly the way HA Lovelace does, then runs the same setConfig HA runs.
    Mirrors the production code path with no shadow.</p>
    <div id="results"></div>
    <hr style="border-color:#333" />
    <h2>Live card renders (if registration succeeded)</h2>
    <div id="live"></div>

    <script>
      // Capture every console call into the page so preview_console_logs sees it.
      const results = document.getElementById('results');
      const live = document.getElementById('live');
      const row = (msg, ok) => {
        const div = document.createElement('div');
        div.className = 'row ' + (ok ? 'ok' : 'fail');
        div.innerHTML = msg;
        results.appendChild(div);
      };

      window.addEventListener('error', (e) => {
        console.error('window.onerror:', e.message, 'at', e.filename + ':' + e.lineno);
        row(`<b>window.onerror</b>: ${e.message}<br>at ${e.filename}:${e.lineno}`, false);
      });
      window.addEventListener('unhandledrejection', (e) => {
        console.error('unhandledrejection:', e.reason);
        row(`<b>unhandled promise</b>: ${e.reason}`, false);
      });

      const CARDS = [
        { tag: 'ecoflow-fleet-card', cfg: { type: 'custom:ecoflow-fleet-card', host: 'http://homeassistant.local:8787', title: 'EcoFlow Fleet', refresh_seconds: 30 } },
        { tag: 'ecoflow-battery-card', cfg: { type: 'custom:ecoflow-battery-card', host: 'http://homeassistant.local:8787', title: 'Battery', refresh_seconds: 30 } },
        { tag: 'ecoflow-solar-card', cfg: { type: 'custom:ecoflow-solar-card', host: 'http://homeassistant.local:8787', title: 'Solar', refresh_seconds: 30 } },
        { tag: 'ecoflow-alerts-card', cfg: { type: 'custom:ecoflow-alerts-card', host: 'http://homeassistant.local:8787', title: 'Alerts', refresh_seconds: 30 } },
        { tag: 'ecoflow-strategy-card', cfg: { type: 'custom:ecoflow-strategy-card', host: 'http://homeassistant.local:8787', title: 'Strategy', refresh_seconds: 30 } },
        { tag: 'ecoflow-insights-card', cfg: { type: 'custom:ecoflow-insights-card', host: 'http://homeassistant.local:8787', title: 'Advanced Insights', refresh_seconds: 60 } },
        { tag: 'ecoflow-circuit-card', cfg: { type: 'custom:ecoflow-circuit-card', host: 'http://homeassistant.local:8787', title: 'East Wing', refresh_seconds: 60, circuit: 1, cost_per_kwh: 0.17 } },
      ];

      // Step 1: load each bundle as a classic script (matches Lovelace res_type=js).
      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = src;
          // crossorigin=anonymous + the add-on's CORS headers means
          // any thrown error inside the IIFE comes through with full
          // file:line:message instead of the scrubbed "Script error.".
          s.crossOrigin = 'anonymous';
          s.async = false;
          s.onload = () => resolve(src);
          s.onerror = () => reject(new Error('failed to load ' + src));
          document.head.appendChild(s);
        });
      }

      (async () => {
        for (const { tag } of CARDS) {
          const url = `/dist/${tag}.js`;
          try {
            await loadScript(url);
            row(`✓ loaded ${tag}.js`, true);
          } catch (e) {
            row(`✗ failed to load ${tag}.js — ${e.message}`, false);
            console.error('load failed:', tag, e);
          }
        }

        // Step 2: verify each custom element is registered + try setConfig.
        for (const { tag, cfg } of CARDS) {
          const ctor = customElements.get(tag);
          if (!ctor) {
            row(`✗ ${tag} not registered after load`, false);
            console.error('not registered:', tag);
            continue;
          }
          row(`✓ ${tag} registered`, true);
          try {
            const el = new ctor();
            if (typeof el.setConfig === 'function') {
              el.setConfig(cfg);
              row(`✓ ${tag} setConfig OK`, true);
            } else {
              row(`! ${tag} has no setConfig (still might render via attrs)`, false);
            }
            // Try to render in the page
            const wrap = document.createElement('div');
            wrap.innerHTML = `<h3>${tag}</h3>`;
            wrap.appendChild(el);
            live.appendChild(wrap);
          } catch (e) {
            row(`✗ ${tag} setConfig threw: ${e.message}`, false);
            console.error('setConfig threw for', tag, ':', e);
          }
        }
        console.log('--- test complete ---');
      })();
    </script>
  </body>
</html>
