version: 2

# Weekly Monday morning PRs (your local Phoenix time), grouped by production
# vs development to keep the PR list short. Major version bumps are
# intentionally ignored — those need deliberate migrations (breaking
# changes, API renames, build-tool rewrites) and shouldn't auto-merge.
# When a major bump is genuinely wanted, open it manually or temporarily
# drop the ignore rule below.

updates:
  # ── npm: server (Fastify, MQTT, etc.) ────────────────────────────────────
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Phoenix
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(server)"
    groups:
      production:
        dependency-type: production
      development:
        dependency-type: development
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── npm: web (Vite/React/Tailwind) ───────────────────────────────────────
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Phoenix
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(web)"
    groups:
      production:
        dependency-type: production
      development:
        dependency-type: development
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions: action versions in .github/workflows ─────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Phoenix
    commit-message:
      prefix: "deps(actions)"
    groups:
      actions:
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── Docker: Dockerfile FROM lines ────────────────────────────────────────
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Phoenix
    commit-message:
      prefix: "deps(docker)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
