name: Publish images

# Build + push multi-arch Docker images to GHCR on tag push, then cut the
# GitHub Release that announces the version is fully installable.
#
# Flow:
#   1. On `v*.*.*` tag push (or manual workflow_dispatch for a re-run), build
#      amd64 + aarch64 in parallel via buildx + QEMU.
#   2. Each image is pushed to ghcr.io/<owner>/{arch}-ecoflow-panel as both
#      :{version} and :latest. HA Supervisor pulls these instead of building
#      on the Pi.
#   3. Once both arch builds succeed, extract the version's CHANGELOG section
#      and create the GitHub Release with it. The Release appearing = "go
#      ahead and update the Pi."
#
# First-time setup: after the very first push, open
# <https://github.com/tesseractAZ?tab=packages> and toggle each of the two new
# packages from Private → Public so HA can pull them anonymously.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to (re)build, without leading v (e.g. 0.2.0)"
        type: string
        required: true

permissions:
  contents: write   # GitHub Release creation
  packages: write   # GHCR push

jobs:
  resolve:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - id: v
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.version }}" ]]; then
            v="${{ inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          if [[ ! "$v" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version '$v' (expected X.Y.Z)"
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=v$v" >> "$GITHUB_OUTPUT"
          echo "📦 Publishing v$v"

  test:
    name: Server tests
    needs: resolve
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server deps
        working-directory: server
        run: npm ci
      - name: Run server tests
        working-directory: server
        # Note: v0.9.0 refactored config.ts to use lazy getters, so the
        # ECOFLOW_ACCESS_KEY / ECOFLOW_SECRET_KEY env vars are no longer
        # required at module-load time. The CI env-var workaround that
        # v0.8.2 needed is no longer necessary.
        run: npm test
      - name: tsc --noEmit (server)
        working-directory: server
        run: npx tsc --noEmit

  build:
    name: Build & push (${{ matrix.arch }})
    needs: [resolve, test]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Each arch builds on its NATIVE host. GitHub started offering free
          # Linux ARM64 runners for public repos in Jan 2025, so we skip the
          # QEMU emulation path entirely. Previously aarch64 ran on amd64
          # hosts via QEMU, which routinely stretched the build to 30–60 min
          # when GitHub's runner pool was busy (50+ min on v0.7.6 + v0.7.7).
          # Native runners hold steady around 3 min and match amd64.
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base:3.21
            runner: ubuntu-24.04-arm
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base:3.21
            runner: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      # QEMU stays so the workflow degrades gracefully if a native runner is
      # unavailable (buildx falls back to emulation). On a matched native
      # runner, this is effectively a sub-second no-op.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner (GHCR requires it)
        id: owner
        run: |
          echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" \
            >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/${{ matrix.arch }}-ecoflow-panel:${{ needs.resolve.outputs.version }}
            ghcr.io/${{ steps.owner.outputs.name }}/${{ matrix.arch }}-ecoflow-panel:latest
          build-args: |
            BUILD_FROM=${{ matrix.base }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            BUILD_DESCRIPTION=EcoFlow Panel
            BUILD_NAME=EcoFlow Panel
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_VERSION=${{ needs.resolve.outputs.version }}
          # v0.9.37 — ignore-error=true so a flaky GHA cache backend doesn't
          # fail the build. Observed 2026-05-26 00:25-00:40 UTC: every push
          # failed with "error writing layer blob: failed to reserve cache"
          # blocking 3 consecutive releases (v0.9.35, v0.9.36, ...).
          cache-from: type=gha,scope=ecoflow-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=ecoflow-${{ matrix.arch }},ignore-error=true

      # v0.9.45 — CodeNotary image signing. Gated on both CN_USER and
      # CN_PASSWORD secrets being present in the GitHub repo. If either
      # is missing, the step is skipped without failing — so the workflow
      # works fine BEFORE the user sets up CodeNotary, and starts signing
      # automatically the next push after they do.
      #
      # `build.yaml` declares the expected signer (epaschal@outlook.com); the
      # secrets must match that identity. HA Supervisor verifies the
      # signature on pull — a mismatch aborts the install.
      - name: Check CodeNotary secrets
        id: cn_check
        env:
          CN_USER: ${{ secrets.CN_USER }}
          CN_PASSWORD: ${{ secrets.CN_PASSWORD }}
        run: |
          if [ -n "$CN_USER" ] && [ -n "$CN_PASSWORD" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "CodeNotary secrets present — will sign images."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "CodeNotary secrets MISSING — skipping signing. To enable:"
            echo "  1. Register CodeNotary at https://www.codenotary.io with epaschal@outlook.com"
            echo "  2. Add CN_USER (= epaschal@outlook.com) and CN_PASSWORD secrets"
            echo "     at https://github.com/${{ github.repository }}/settings/secrets/actions"
          fi

      # v0.9.47 — Install vcn natively per-arch. The previous version used
      # `docker run codenotary/vcn:latest` which only publishes an amd64
      # image; on our aarch64 runner (ubuntu-24.04-arm) Docker fell back
      # to QEMU emulation and the Go binary SIGSEGV'd in netpoll on
      # startup. CodeNotary ships native arm64/amd64 binaries on their
      # GitHub releases page, so install one directly.
      - name: Install vcn
        if: steps.cn_check.outputs.configured == 'true'
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64)  VCN_ARCH=amd64 ;;
            aarch64) VCN_ARCH=arm64 ;;
            *) echo "Unsupported arch: $(uname -m)"; exit 1 ;;
          esac
          VCN_VERSION=v0.9.13
          curl -fsSL -o /tmp/vcn \
            "https://github.com/codenotary/vcn/releases/download/${VCN_VERSION}/vcn-${VCN_VERSION}-linux-${VCN_ARCH}-static"
          sudo install -m 0755 /tmp/vcn /usr/local/bin/vcn
          vcn --version

      - name: Sign image with CodeNotary
        if: steps.cn_check.outputs.configured == 'true'
        env:
          VCN_USER: ${{ secrets.CN_USER }}
          VCN_PASSWORD: ${{ secrets.CN_PASSWORD }}
          VCN_NOTARIZATION_PASSWORD: ${{ secrets.CN_PASSWORD }}
        run: |
          set -euo pipefail
          # Authenticate to CodeNotary (writes session token to ~/.vcn).
          vcn login
          IMG_VER="ghcr.io/${{ steps.owner.outputs.name }}/${{ matrix.arch }}-ecoflow-panel:${{ needs.resolve.outputs.version }}"
          IMG_LATEST="ghcr.io/${{ steps.owner.outputs.name }}/${{ matrix.arch }}-ecoflow-panel:latest"
          for IMG in "$IMG_VER" "$IMG_LATEST"; do
            echo "::group::vcn notarize $IMG"
            vcn notarize --silent --output json "docker://$IMG" \
              | tee "/tmp/vcn-$(basename "$IMG" | tr ':' '-').json"
            echo "::endgroup::"
          done

  release:
    name: Cut GitHub Release
    needs: [resolve, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Skip if Release already exists
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ needs.resolve.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release ${{ needs.resolve.outputs.tag }} already exists; skipping create"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract notes from CHANGELOG.md
        if: steps.gate.outputs.skip != 'true'
        env:
          NEXT: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/notes.md
          import os, re
          version = os.environ["NEXT"]
          with open("CHANGELOG.md") as f:
              content = f.read()
          # Match the "## <version> …" header through end of section (next "## " or EOF)
          pattern = re.compile(
              rf"^## {re.escape(version)}\b.*?(?=^## |\Z)",
              re.MULTILINE | re.DOTALL,
          )
          m = pattern.search(content)
          if m:
              # Strip the header line itself; print the body.
              body = m.group(0).split("\n", 1)[1].strip()
              print(body)
          else:
              print("_(see CHANGELOG.md)_")
          PY
          echo "── notes preview ────────────────────────────"
          cat /tmp/notes.md
          echo "─────────────────────────────────────────────"

      - name: Create GitHub Release
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.resolve.outputs.tag }}" \
            --title "${{ needs.resolve.outputs.tag }}" \
            --notes-file /tmp/notes.md

      - name: Summary
        env:
          V: ${{ needs.resolve.outputs.version }}
        run: |
          {
            echo "## ✅ v${V} published"
            echo
            echo "Pre-built images:"
            echo
            echo "- \`ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/aarch64-ecoflow-panel:${V}\`"
            echo "- \`ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/amd64-ecoflow-panel:${V}\`"
            echo
            echo "On your Pi:"
            echo
            echo '```bash'
            echo "cd /addons/ecoflow-panel && git pull"
            echo '```'
            echo
            echo "Home Assistant detects the new version and surfaces an **Update** button."
          } >> "$GITHUB_STEP_SUMMARY"
