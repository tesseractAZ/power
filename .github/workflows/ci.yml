name: CI

# Type-check both projects on every push and PR. Cheap insurance that no
# broken commit lands on main and gets installed onto the Pi.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege: both jobs only read the repo (checkout). Buildx GHA cache
# uses the runtime token, not GITHUB_TOKEN, so no extra scopes are needed.
permissions:
  contents: read

jobs:
  typecheck:
    name: Type-check ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [server, web]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install
        working-directory: ${{ matrix.project }}
        run: npm ci

      - name: tsc --noEmit
        working-directory: ${{ matrix.project }}
        run: ./node_modules/.bin/tsc --noEmit -p tsconfig.json

  docker-smoke:
    # Build the Home Assistant add-on container (amd64 only) on every push/PR.
    # Catches Dockerfile regressions before they reach the Pi. Buildx cache
    # in GitHub Actions cache cuts subsequent runs to ~1–2 minutes.
    name: Dockerfile smoke build (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: false
          build-args: |
            # v1.7.0 (security #6, CWE-1357) — digest-pinned; keep in lockstep
            # with images.yml amd64 base.
            BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.21@sha256:995fc8a44059b3bac015603f63b56b1bf935c2227c5176823d9bb76b45fc2249
            BUILD_ARCH=amd64
            BUILD_DATE=ci
            BUILD_DESCRIPTION=EcoFlow Panel (smoke)
            BUILD_NAME=EcoFlow Panel
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_VERSION=ci
          # v0.9.37 — ignore-error=true so a flaky GHA cache doesn't fail the smoke build.
          cache-from: type=gha,scope=docker-smoke
          cache-to: type=gha,mode=max,scope=docker-smoke,ignore-error=true

  docs-docx:
    # Assemble README + SECURITY + DOCS into the printable .docx on every
    # push/PR. Purpose is twofold: (1) catch a DOCS.md that no longer converts
    # cleanly BEFORE it reaches a release, and (2) publish a downloadable
    # preview artifact so reviewers can read the offline manual for the branch.
    # The same generator (scripts/build-docs-docx.py) attaches the .docx to the
    # GitHub Release in images.yml, so this job keeps that path exercised.
    name: Build documentation (.docx + .pdf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Ensure pandoc
        run: |
          command -v pandoc >/dev/null || { sudo apt-get update && sudo apt-get install -y pandoc; }
          pandoc --version | head -1

      - name: Build .docx
        run: |
          python3 scripts/build-docs-docx.py \
            --ref "${GITHUB_SHA:0:7}" \
            --output "EcoFlow-Panel-Documentation.docx"

      # A PDF alongside the .docx — a faithful render of the SAME document (same
      # generated TOC + page breaks) via LibreOffice headless (no LaTeX). On the
      # PR this is a HARD gate (if-no-files-found: error below): a DOCS.md or
      # toolchain change that can't produce a PDF fails the check rather than
      # silently shipping a release without one.
      - name: Ensure LibreOffice (docx → pdf)
        run: |
          command -v libreoffice >/dev/null || { sudo apt-get update && sudo apt-get install -y --no-install-recommends libreoffice-writer; }
          libreoffice --version | head -1

      - name: Build .pdf (render the .docx)
        run: |
          libreoffice --headless -env:UserInstallation=file:///tmp/loprofile \
            --convert-to pdf --outdir . "EcoFlow-Panel-Documentation.docx"
          test -s EcoFlow-Panel-Documentation.pdf
          ls -la EcoFlow-Panel-Documentation.pdf

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: documentation
          path: |
            EcoFlow-Panel-Documentation.docx
            EcoFlow-Panel-Documentation.pdf
          if-no-files-found: error
