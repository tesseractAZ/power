# Per-arch base images supplied by Home Assistant.
# 3.21 ships Node 22 in the Alpine main repo (we apk-install nodejs+npm).
# v1.7.2 (security #6, CWE-1357) — digest-pinned to match images.yml + ci.yml so a
# local HA build (this fallback path) can't silently pull a repointed `3.21` tag.
# Keep these three files in lockstep; update the digest deliberately on a base bump.
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base:3.21@sha256:5100b3a2e4741440e7bd587c124920fa3bf02287c4de3cb48aacef7049530ee1
  amd64: ghcr.io/home-assistant/amd64-base:3.21@sha256:995fc8a44059b3bac015603f63b56b1bf935c2227c5176823d9bb76b45fc2249

args:
  TZ: UTC

labels:
  org.opencontainers.image.title: Power
  org.opencontainers.image.description: Local dashboard + control-room TUI for an EcoFlow off-grid home
  org.opencontainers.image.source: https://github.com/tesseractAZ/ecoflow-panel
  org.opencontainers.image.licenses: MIT

# v0.9.48 — CodeNotary image signing REMOVED.
#
# v0.9.45-47 set up CodeNotary signing (vcn notarize) for a +1 HA
# security-rating bump. Discovered the hard way during v0.9.47 testing
# that the OSS vcn project is dead:
#   - https://github.com/codenotary/vcn → 404 (repo archived/deleted)
#   - codenotary/vcn:latest Docker image still exists but is amd64-only
#     (SIGSEGV under QEMU on aarch64 runner)
#   - GitHub releases page that hosted native binaries: gone
#
# Home Assistant's own add-ons repo (home-assistant/addons) no longer
# references codenotary in their builder workflow either — HA has
# quietly accepted the same ceiling.
#
# Net result: the rating ceiling for this add-on is ~7 (with AppArmor
# from v0.9.44), not 8. To go higher would require a different signing
# scheme that HA Supervisor verifies natively — at time of writing
# (2026-05-26) that doesn't exist for third-party add-ons.
#
# The CN_USER + CN_PASSWORD secrets in the GitHub repo are harmless if
# left in place — no workflow references them anymore. Delete via repo
# Settings → Secrets if you want a clean inventory.
