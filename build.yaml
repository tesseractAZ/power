# Per-arch base images supplied by Home Assistant.
# 3.21 ships Node 22 in the Alpine main repo (we apk-install nodejs+npm).
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base:3.21
  amd64: ghcr.io/home-assistant/amd64-base:3.21

args:
  TZ: UTC

labels:
  org.opencontainers.image.title: EcoFlow Panel
  org.opencontainers.image.description: Local dashboard + control-room TUI for an EcoFlow off-grid home
  org.opencontainers.image.source: https://github.com/tesseractAZ/ecoflow-panel
  org.opencontainers.image.licenses: MIT

# v0.9.45 — CodeNotary image signing.
#
# Home Assistant Supervisor verifies the published image was signed by
# the identity in `signer` (a CodeNotary account email) before pulling +
# running. Provides supply-chain integrity: a hijacked GHCR token alone
# can't ship a backdoored image — the attacker would also need to forge
# a signature against this identity, which requires CN_USER+CN_PASSWORD.
#
# `base_image` declares the identity that signed the FROM image. HA's
# official base images are signed by notary@home-assistant.io, so that
# value is fixed.
#
# `signer` is the identity that signs THIS add-on's image. Must match
# the CodeNotary account whose credentials live in the CN_USER /
# CN_PASSWORD GitHub secrets. To change later: update this field +
# update the GitHub secrets to match.
#
# Setup required (one-time):
#   1. Register CodeNotary account at https://www.codenotary.io with
#      epaschal@outlook.com.
#   2. Add GitHub repo secrets:
#        CN_USER     = epaschal@outlook.com
#        CN_PASSWORD = <your CodeNotary password>
#      via https://github.com/tesseractAZ/ecoflow-panel/settings/secrets/actions
#   3. Next release will sign automatically. The CI step is gated on
#      both secrets being present, so until step 2 lands the workflow
#      skips signing without failing.
codenotary:
  signer: epaschal@outlook.com
  base_image: notary@home-assistant.io
