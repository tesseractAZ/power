name: EcoFlow Panel
version: "0.9.36"
slug: ecoflow_panel
description: >-
  Live dashboard + control-room TUI for an EcoFlow off-grid home — SHP2,
  Delta Pro Ultras, EV charger; learned anomaly detection, day-ahead
  forecasting, and per-pack capacity-fade → end-of-life projection.
url: https://github.com/tesseractAZ/ecoflow-panel
arch:
  - aarch64
  - amd64
# Pre-built multi-arch images on GHCR — built and pushed by .github/workflows/images.yml.
# HA Supervisor substitutes {arch} with the host's CPU arch (aarch64, amd64, …).
image: ghcr.io/tesseractaz/{arch}-ecoflow-panel
startup: services
boot: auto
stage: experimental
# HA's `init: true` default wraps the container with Docker's tini, making
# tini PID 1. The HA base image already ships its own s6-overlay init at
# /init; with tini in front, s6-overlay-suexec sees it isn't PID 1 and
# refuses to start (crash loop with "fatal: can only run as pid 1"). Turn
# tini off so our /init (s6) runs as PID 1 — the standard pattern for any
# add-on built on the official HA base images.
init: false
ports:
  8787/tcp: 8787
  2323/tcp: 2323
ports_description:
  8787/tcp: Web dashboard + REST API + WebSocket
  2323/tcp: Telnet "control-room" TUI (no auth — keep on a trusted LAN)
# v0.9.5 — HA Ingress: makes the panel appear as a sidebar item inside
# Home Assistant (visible in the HA mobile app), authenticated through
# HA's normal session. Same server, same port — HA's hassio_ingress
# reverse-proxies in. Direct LAN access on :8787 still works.
ingress: true
ingress_port: 8787
panel_icon: mdi:home-battery
panel_title: EcoFlow Panel
panel_admin: false
map:
  - data:rw
# v0.9.20 — request access to Home Assistant's Core REST API so the
# add-on can call media_player.play_media (HomePod/Sonos broadcasts),
# enumerate media_player entities for the SHIPWIDE INTERCOM discovery
# panel, and check entity states. Without this flag SUPERVISOR_TOKEN
# is not granted access to /core/api/* endpoints — every broadcast
# returns "SUPERVISOR_TOKEN missing or HA unreachable".
homeassistant_api: true
# v0.9.33 — Supervisor API access at "manager" role. Granted explicitly
# by the user so we can:
#   - List installed add-ons (POST-install Piper visibility checks)
#   - Auto-bridge integrations via Core config-flow (Wyoming Protocol →
#     Piper TTS without making the user click through Settings UI)
# We do NOT install/uninstall add-ons in code without explicit user
# action — every Supervisor call goes through a named endpoint.
hassio_api: true
hassio_role: manager
options:
  ECOFLOW_ACCESS_KEY: ""
  ECOFLOW_SECRET_KEY: ""
  ECOFLOW_API_HOST: https://api-a.ecoflow.com
  LOG_LEVEL: info
  FORECAST_LAT: 33.4484
  FORECAST_LON: -112.074
  TELNET_ENABLED: true
  TELNET_PORT: 2323
  NOTIFY_CHANNEL: none
  NOTIFY_MIN_SEVERITY: warning
  NOTIFY_RESOLVED: true
  NOTIFY_NTFY_SERVER: https://ntfy.sh
  NOTIFY_NTFY_TOPIC: ""
  NOTIFY_PUSHOVER_TOKEN: ""
  NOTIFY_PUSHOVER_USER: ""
  NOTIFY_WEBHOOK_URL: ""
  # v0.7.5 — quiet-hours digest + NWS storm-prep + MQTT Discovery (all opt-in)
  NOTIFY_QUIET_HOURS: "22-06"
  NOTIFY_DIGEST_HOUR: 7
  NWS_ENABLED: false
  MQTT_DISCOVERY_ENABLED: false
  MQTT_DISCOVERY_HOST: ""
  MQTT_DISCOVERY_PORT: 1883
  MQTT_DISCOVERY_USER: ""
  MQTT_DISCOVERY_PASS: ""
  MQTT_DISCOVERY_PREFIX: homeassistant
  # v0.9.9 — set this to a non-empty secret to enable the diagnostic
  # POST /api/device/send-command endpoint, used to probe undocumented
  # EcoFlow commands (e.g. SHP2 reboot — there's no documented public
  # reboot, so anyone who wants one has to discover the shape empirically).
  # Leave empty in normal operation. Requires the same value in the
  # `x-write-debug-token` header on every call.
  WRITE_DEBUG_TOKEN: ""
  # v0.9.18 — ship-wide audible broadcast to HomePod / Sonos via HA's
  # media_player service. Off by default; set ENABLED=true and at
  # least one target entity ID to opt in.
  BROADCAST_ENABLED: false
  # Comma-separated media_player entity IDs. e.g.:
  #   media_player.living_room, media_player.kitchen, media_player.master_homepod
  BROADCAST_TARGETS: ""
  # URL the speakers will fetch the klaxon WAVs from. Must be reachable
  # from the speakers on the LAN. Default uses mDNS — set to your HA
  # Pi's IP (http://192.168.x.x:8787) if mDNS is flaky on your network.
  BROADCAST_AUDIO_BASE: "http://homeassistant.local:8787"
  BROADCAST_VOLUME: 0.5
  # Min alarm severity that triggers a broadcast.
  BROADCAST_MIN_SEVERITY: critical
  # Quiet hours suppress warning/info broadcasts. Critical always fires.
  BROADCAST_QUIET_HOURS: "22-06"
  # v0.9.30 — TTS announcement after the klaxon. Leave EMPTY to
  # auto-detect — the add-on probes HA's service catalog on startup and
  # picks the best engine available, preferring local/off-grid-safe:
  #   1. tts.piper                 (local, free, off-grid OK — install
  #                                 the Piper add-on; strongly recommended)
  #   2. tts.cloud_say             (Home Assistant Cloud / Nabu Casa)
  #   3. tts.google_translate_say  (free, needs internet)
  #   4. tts.elevenlabs_say        (premium voices, per-char billed)
  # Set explicitly to override the auto-pick:
  BROADCAST_TTS_SERVICE: ""
  BROADCAST_TTS_LANGUAGE: en-US
  # Sonos-specific: snapshot the current state before broadcasting and
  # restore it after, so a music session resumes. Leave on unless you
  # see odd behavior.
  BROADCAST_SONOS_RESTORE: true
  # v0.9.23 — backend selection for broadcast service calls.
  #   auto             — use music_assistant.play_announcement when MA is
  #                      installed in HA, else fall back to media_player.play_media
  #   music_assistant  — force MA path (will fail if MA isn't installed)
  #   media_player     — never use MA, always use media_player.play_media
  # MA's announce service plays SIMULTANEOUSLY across all targets (no
  # per-speaker delay), handles volume override + restore atomically, and
  # bypasses the music queue. Recommended when MA is installed.
  BROADCAST_USE_MUSIC_ASSISTANT: auto
schema:
  ECOFLOW_ACCESS_KEY: password
  ECOFLOW_SECRET_KEY: password
  ECOFLOW_API_HOST: url
  LOG_LEVEL: list(trace|debug|info|warn|error|fatal)
  FORECAST_LAT: float
  FORECAST_LON: float
  TELNET_ENABLED: bool
  TELNET_PORT: port
  NOTIFY_CHANNEL: list(none|ntfy|pushover|webhook)
  NOTIFY_MIN_SEVERITY: list(warning|critical)
  NOTIFY_RESOLVED: bool
  # The two URL-looking fields below intentionally use `str?` instead of
  # `url?`. HA's voluptuous schema treats `url?` as "may be absent" — but if
  # present with an empty default it rejects the save. Both fields ship with
  # an empty default (only filled when the matching NOTIFY_CHANNEL is used),
  # so they'd block Save on first install. The runtime notify code validates
  # the URL at the moment it actually uses the channel.
  NOTIFY_NTFY_SERVER: "str?"
  NOTIFY_NTFY_TOPIC: "str?"
  NOTIFY_PUSHOVER_TOKEN: "password?"
  NOTIFY_PUSHOVER_USER: "password?"
  NOTIFY_WEBHOOK_URL: "str?"
  NOTIFY_QUIET_HOURS: "str?"
  NOTIFY_DIGEST_HOUR: int(0,23)?
  NWS_ENABLED: bool
  MQTT_DISCOVERY_ENABLED: bool
  MQTT_DISCOVERY_HOST: "str?"
  MQTT_DISCOVERY_PORT: port
  MQTT_DISCOVERY_USER: "str?"
  MQTT_DISCOVERY_PASS: "password?"
  MQTT_DISCOVERY_PREFIX: "str?"
  WRITE_DEBUG_TOKEN: "password?"
  BROADCAST_ENABLED: bool
  BROADCAST_TARGETS: "str?"
  BROADCAST_AUDIO_BASE: "str?"
  BROADCAST_VOLUME: float
  BROADCAST_MIN_SEVERITY: list(critical|warning)
  BROADCAST_QUIET_HOURS: "str?"
  BROADCAST_TTS_SERVICE: "str?"
  BROADCAST_TTS_LANGUAGE: "str?"
  BROADCAST_SONOS_RESTORE: bool
  BROADCAST_USE_MUSIC_ASSISTANT: list(auto|music_assistant|media_player|true|false)
