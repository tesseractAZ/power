<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Power</title>
    <!--
      v0.8.0 — PWA installable on iOS / Android / desktop. The service
      worker caches the shell (HTML/JS/CSS) stale-while-revalidate, but
      /api and /ws traffic always hits the network so telemetry stays live.

      v0.9.5 — every asset reference is now RELATIVE (no leading slash)
      so the SPA works both directly (:8787/) and under HA Ingress
      (/api/hassio_ingress/<token>/) without per-deployment config.
    -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0b1014" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EcoFlow" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <!--
      v0.9.14 — preconnect to Google Fonts so the first theme-switch to High
      Contrast doesn't pay a fresh TLS handshake when the <link> is injected. The
      connection is shared across the two font CDN hosts.
      Browsers ignore the preconnect if it goes unused, so this is free
      for default-theme users.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body class="bg-bg text-ink antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register the SW after first paint so it doesn't delay initial render.
      // SW caches shell only; live API/WS calls bypass it entirely.
      // v0.9.5 — relative path so the SW URL is resolved against the SPA's
      // current location (works under HA Ingress and direct LAN both).
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('sw.js').catch(function () {});
        });
      }
    </script>
  </body>
</html>
